[project]
name = "sidecar"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40.0",
    "fastapi>=0.135.2",
    "mlx-audio>=0.4.1",
    "mlx-lm>=0.31.1",
    "pyannote-audio>=4.0.4",
    "pydantic-settings>=2.13.1",
    "pywhispercpp>=1.4.1",
    "uvicorn>=0.42.0",
]

[dependency-groups]
dev = [
    "anyio>=4.13.0",
    "httpx>=0.28.1",
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
