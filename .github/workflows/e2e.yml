name: E2E Tests

on:
  push:
    branches: [main, "dev/**"]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Install Python stub dependencies
        run: pip install fastapi uvicorn websockets

      - name: Setup Rails test DB
        run: cd backend && bundle exec rails db:create db:migrate RAILS_ENV=test
        env:
          RAILS_ENV: test

      - name: Start Python Sidecar stub
        run: |
          cd e2e/stubs && uvicorn sidecar_stub:app --port 8001 &
          sleep 3
        env:
          PYTHONPATH: .

      - name: Run E2E tests
        run: cd frontend && npx playwright test --config ../e2e/playwright.config.ts
        env:
          RAILS_ENV: test
          STT_ENGINE: stub
          SIDECAR_URL: http://localhost:8001
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/reports/
          retention-days: 7
