<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="680" rx="16" fill="#f8fafc"/>

  <!-- Tauri Shell (outermost) -->
  <rect x="40" y="20" width="740" height="220" rx="12" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="60" y="44" font-size="13" fill="#64748b" font-weight="500">Tauri Desktop Shell (선택적)</text>

  <!-- React SPA -->
  <rect x="70" y="56" width="680" height="170" rx="10" fill="url(#g1)" stroke="#818cf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="82" font-size="15" fill="#4338ca" font-weight="700" text-anchor="middle">React SPA</text>
  <text x="340" y="100" font-size="11" fill="#6366f1" text-anchor="middle">TypeScript + Vite + Zustand</text>

  <rect x="95" y="114" width="145" height="44" rx="6" fill="#fff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="167" y="133" font-size="11" fill="#4338ca" text-anchor="middle" font-weight="600">라이브 기록</text>
  <text x="167" y="148" font-size="10" fill="#6366f1" text-anchor="middle">AudioWorklet VAD</text>

  <rect x="260" y="114" width="145" height="44" rx="6" fill="#fff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="332" y="133" font-size="11" fill="#4338ca" text-anchor="middle" font-weight="600">AI 회의록</text>
  <text x="332" y="148" font-size="10" fill="#6366f1" text-anchor="middle">BlockNote 에디터</text>

  <rect x="425" y="114" width="145" height="44" rx="6" fill="#fff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="497" y="133" font-size="11" fill="#4338ca" text-anchor="middle" font-weight="600">오디오 플레이어</text>
  <text x="497" y="148" font-size="10" fill="#6366f1" text-anchor="middle">WaveSurfer.js</text>

  <rect x="590" y="114" width="145" height="44" rx="6" fill="#fff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="662" y="133" font-size="11" fill="#4338ca" text-anchor="middle" font-weight="600">메모 에디터</text>
  <text x="662" y="148" font-size="10" fill="#6366f1" text-anchor="middle">Mermaid 렌더링</text>

  <!-- Arrow: React → Rails -->
  <line x1="410" y1="240" x2="410" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <rect x="340" y="250" width="140" height="22" rx="4" fill="#f1f5f9"/>
  <text x="410" y="265" font-size="11" fill="#475569" text-anchor="middle" font-weight="500">REST + WebSocket</text>

  <!-- Rails API -->
  <rect x="100" y="286" width="620" height="130" rx="10" fill="url(#g2)" stroke="#f472b6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="410" y="312" font-size="15" fill="#be185d" font-weight="700" text-anchor="middle">Ruby on Rails 8.1 API Server</text>

  <rect x="125" y="326" width="175" height="36" rx="6" fill="#fff" stroke="#f9a8d4" stroke-width="1"/>
  <text x="212" y="349" font-size="11" fill="#be185d" text-anchor="middle" font-weight="600">ActionCable WebSocket</text>

  <rect x="320" y="326" width="175" height="36" rx="6" fill="#fff" stroke="#f9a8d4" stroke-width="1"/>
  <text x="407" y="349" font-size="11" fill="#be185d" text-anchor="middle" font-weight="600">Solid Queue 작업 큐</text>

  <rect x="515" y="326" width="175" height="36" rx="6" fill="#fff" stroke="#f9a8d4" stroke-width="1"/>
  <text x="602" y="349" font-size="11" fill="#be185d" text-anchor="middle" font-weight="600">REST API v1</text>

  <text x="410" y="400" font-size="11" fill="#9d174d" text-anchor="middle">Meeting · Transcript · Summary · ActionItem · Block · Folder</text>

  <!-- Arrow: Rails → SQLite -->
  <line x1="200" y1="416" x2="200" y2="470" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow: Rails → Sidecar -->
  <line x1="550" y1="416" x2="550" y2="470" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="570" y="448" font-size="11" fill="#475569" font-weight="500">HTTP</text>

  <!-- SQLite -->
  <rect x="100" y="476" width="200" height="70" rx="10" fill="url(#g4)" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="504" font-size="14" fill="#92400e" font-weight="700" text-anchor="middle">SQLite3</text>
  <text x="200" y="524" font-size="11" fill="#b45309" text-anchor="middle">로컬 DB · WAL 모드</text>

  <!-- Python Sidecar -->
  <rect x="380" y="476" width="380" height="180" rx="10" fill="url(#g3)" stroke="#34d399" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="504" font-size="15" fill="#065f46" font-weight="700" text-anchor="middle">Python Sidecar (FastAPI)</text>

  <rect x="405" y="518" width="150" height="50" rx="6" fill="#fff" stroke="#6ee7b7" stroke-width="1"/>
  <text x="480" y="538" font-size="12" fill="#065f46" text-anchor="middle" font-weight="600">STT Adapter</text>
  <text x="480" y="555" font-size="10" fill="#059669" text-anchor="middle">Qwen3 / Whisper</text>

  <rect x="575" y="518" width="160" height="50" rx="6" fill="#fff" stroke="#6ee7b7" stroke-width="1"/>
  <text x="655" y="538" font-size="12" fill="#065f46" text-anchor="middle" font-weight="600">화자 분리</text>
  <text x="655" y="555" font-size="10" fill="#059669" text-anchor="middle">pyannote.audio 4.0</text>

  <rect x="405" y="580" width="330" height="44" rx="6" fill="#fff" stroke="#6ee7b7" stroke-width="1"/>
  <text x="570" y="600" font-size="12" fill="#065f46" text-anchor="middle" font-weight="600">LLM 요약</text>
  <text x="570" y="616" font-size="10" fill="#059669" text-anchor="middle">Claude / OpenAI / Ollama / Z.ai GLM</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
