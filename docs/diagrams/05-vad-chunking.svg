<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 440" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <filter id="d">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="540" height="440" rx="16" fill="#f8fafc"/>

  <!-- Step 1 -->
  <rect x="140" y="20" width="260" height="50" rx="25" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#d)"/>
  <text x="270" y="42" font-size="13" fill="#1e40af" text-anchor="middle" font-weight="700">연속 음성 스트림</text>
  <text x="270" y="58" font-size="10" fill="#3b82f6" text-anchor="middle">마이크 입력</text>

  <line x1="270" y1="70" x2="270" y2="100" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <rect x="100" y="106" width="340" height="50" rx="10" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5" filter="url(#d)"/>
  <text x="270" y="128" font-size="13" fill="#4338ca" text-anchor="middle" font-weight="700">AudioWorklet (브라우저)</text>
  <text x="270" y="146" font-size="11" fill="#6366f1" text-anchor="middle">실시간 오디오 프레임 수집</text>

  <line x1="270" y1="156" x2="270" y2="186" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 3: VAD -->
  <rect x="80" y="192" width="380" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#d)"/>
  <text x="270" y="216" font-size="13" fill="#92400e" text-anchor="middle" font-weight="700">VAD 음성 감지 + 청크 경계 결정</text>

  <rect x="110" y="228" width="165" height="26" rx="5" fill="#fff" stroke="#fde68a" stroke-width="1"/>
  <text x="192" y="246" font-size="10" fill="#92400e" text-anchor="middle">무음 0.5초 → 청크 분리</text>

  <rect x="290" y="228" width="150" height="26" rx="5" fill="#fff" stroke="#fde68a" stroke-width="1"/>
  <text x="365" y="246" font-size="10" fill="#92400e" text-anchor="middle">최소 2초 ~ 최대 10초</text>

  <rect x="160" y="262" width="220" height="22" rx="5" fill="#fff" stroke="#fde68a" stroke-width="1"/>
  <text x="270" y="278" font-size="10" fill="#92400e" text-anchor="middle">0.5초 오버랩 → 경계 음절 손실 방지</text>

  <line x1="270" y1="292" x2="270" y2="322" stroke="#64748b" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <rect x="100" y="328" width="340" height="50" rx="10" fill="#d1fae5" stroke="#34d399" stroke-width="1.5" filter="url(#d)"/>
  <text x="270" y="350" font-size="13" fill="#065f46" text-anchor="middle" font-weight="700">최적 크기 오디오 청크</text>
  <text x="270" y="368" font-size="11" fill="#059669" text-anchor="middle">base64 인코딩 → STT 전송</text>

  <!-- Waveform illustration -->
  <g transform="translate(70, 396)">
    <text x="0" y="12" font-size="9" fill="#94a3b8">음성 파형 예시:</text>
    <!-- Simulated waveform -->
    <path d="M80,20 Q90,5 100,20 Q110,35 120,20 Q130,8 140,20 Q150,32 160,20 Q165,14 170,20 L180,20 L190,20 L200,20 Q210,8 220,20 Q230,35 240,20 Q250,5 260,20 Q270,30 280,20 Q285,15 290,20 L300,20 L310,20 Q320,5 330,20 Q340,32 350,20"
      fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Chunk boundaries -->
    <line x1="170" y1="6" x2="170" y2="34" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2"/>
    <line x1="300" y1="6" x2="300" y2="34" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="125" y="44" font-size="8" fill="#f59e0b" text-anchor="middle">청크 1</text>
    <text x="235" y="44" font-size="8" fill="#f59e0b" text-anchor="middle">무음</text>
    <text x="335" y="44" font-size="8" fill="#f59e0b" text-anchor="middle">청크 2</text>
  </g>
</svg>
