<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 360" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arl" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#64748b"/>
    </marker>
    <filter id="s">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="820" height="360" rx="16" fill="#f8fafc"/>

  <!-- Server PC -->
  <rect x="40" y="30" width="380" height="300" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" filter="url(#s)"/>
  <text x="230" y="58" font-size="15" fill="#991b1b" text-anchor="middle" font-weight="700">사내 워크스테이션 (서버 PC)</text>
  <text x="230" y="76" font-size="11" fill="#b91c1c" text-anchor="middle">GPU 탑재 · 고정 IP · 사내 네트워크</text>

  <rect x="65" y="94" width="330" height="38" rx="6" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
  <text x="230" y="118" font-size="12" fill="#991b1b" text-anchor="middle" font-weight="600">Nginx (리버스 프록시 · SSL 종료)</text>

  <rect x="65" y="146" width="155" height="50" rx="6" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="142" y="168" font-size="12" fill="#be185d" text-anchor="middle" font-weight="600">Rails 8.1</text>
  <text x="142" y="184" font-size="10" fill="#db2777" text-anchor="middle">Puma + ActionCable</text>

  <rect x="240" y="146" width="155" height="50" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="317" y="168" font-size="12" fill="#065f46" text-anchor="middle" font-weight="600">Python Sidecar</text>
  <text x="317" y="184" font-size="10" fill="#059669" text-anchor="middle">FastAPI + Uvicorn</text>

  <rect x="65" y="210" width="155" height="50" rx="6" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="142" y="232" font-size="12" fill="#92400e" text-anchor="middle" font-weight="600">SQLite3</text>
  <text x="142" y="248" font-size="10" fill="#b45309" text-anchor="middle">WAL 모드</text>

  <rect x="240" y="210" width="155" height="50" rx="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="317" y="232" font-size="12" fill="#4338ca" text-anchor="middle" font-weight="600">AI 모델 추론</text>
  <text x="317" y="248" font-size="10" fill="#6366f1" text-anchor="middle">STT · 화자분리 · LLM</text>

  <rect x="65" y="274" width="330" height="36" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="230" y="297" font-size="11" fill="#475569" text-anchor="middle">Solid Queue (비동기 작업) · Cron (DB 백업)</text>

  <!-- Arrows between -->
  <line x1="440" y1="180" x2="490" y2="180" stroke="#64748b" stroke-width="2" marker-start="url(#arl)" marker-end="url(#ar)"/>
  <text x="465" y="170" font-size="10" fill="#475569" text-anchor="middle">HTTP</text>
  <text x="465" y="196" font-size="10" fill="#475569" text-anchor="middle">WS</text>

  <!-- Client PCs -->
  <rect x="510" y="60" width="270" height="240" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s)"/>
  <text x="645" y="88" font-size="15" fill="#1e40af" text-anchor="middle" font-weight="700">각 사용자 PC</text>

  <!-- Tauri App icon -->
  <rect x="545" y="108" width="200" height="170" rx="10" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="645" y="134" font-size="14" fill="#1e40af" text-anchor="middle" font-weight="700">Tauri 데스크톱 앱</text>

  <rect x="570" y="148" width="150" height="34" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="645" y="170" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="600">React SPA UI</text>

  <rect x="570" y="194" width="150" height="34" rx="6" fill="#fff" stroke="#93c5fd" stroke-width="1"/>
  <text x="645" y="216" font-size="11" fill="#1e40af" text-anchor="middle" font-weight="600">시스템 트레이</text>

  <rect x="570" y="240" width="150" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="645" y="259" font-size="10" fill="#475569" text-anchor="middle">가벼운 클라이언트 (~10MB)</text>
</svg>
