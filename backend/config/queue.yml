default: &default
  dispatchers:
    - polling_interval: 0.1
      batch_size: 500
  workers:
    # 실시간 STT: 높은 우선순위, 빠른 처리
    - queues: real_time
      threads: 5
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
    # 요약 Job: 별도 worker로 STT 처리와 경합 방지
    - queues: summarization
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 1
    # 파일(배치) 전사: sidecar STT를 직렬로 호출 (동시 실행 시 GPU/모델 경합)
    - queues: file_transcription
      threads: 1
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 1
    # 기타 백그라운드 작업
    # ⚠️ queue_as로 새 큐를 만들면 반드시 여기 워커에도 등록할 것 —
    #    빠지면 production(solid_queue)에서 잡이 영원히 ready로 방치된다
    #    (development는 async 어댑터라 큐 이름을 무시해 안 드러남)
    - queues: [default, card_extraction, solid_queue_recurring]
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
